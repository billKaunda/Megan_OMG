[profile.default]
# This repo already uses `src/` for the React frontend, so Solidity sources
# live in `contracts/` and Foundry is pointed there explicitly.
src = "contracts"
test = "test"
script = "script"
libs = ["lib"]
out = "out"
cache_path = "cache"

# Pin the compiler for reproducible, deterministic builds across machines/CI.
solc = "0.8.28"
evm_version = "cancun"

# Optimizer tuned for a token that is deployed once but whose transfer/approve
# paths are called many times: a high run count favours cheaper runtime calls.
optimizer = true
optimizer_runs = 10_000
via_ir = false

# Warnings do not fail the build; `make ci` gates on fmt + tests instead.
deny = "never"
bytecode_hash = "none"

# `forge fmt` must never touch the original AssessmentToken.sol: it is the
# pristine baseline the review in SMART_CONTRACT_REVIEW.md refers to, and
# reformatting it would invalidate the line references and the diff against
# ImprovedAssessmentToken.sol.
[fmt]
ignore = ["contracts/AssessmentToken.sol"]

# The erc20-unchecked-transfer lint targets integrators that call an untrusted
# external token and ignore its bool return. It does not apply here: these
# contracts ARE the token, and the test suites call a token that reverts on
# failure rather than returning false — so the rule only produces noise.
[lint]
exclude_lints = ["erc20-unchecked-transfer"]

# Fuzz/invariant defaults — enough runs to catch arithmetic edge cases in CI.
[fuzz]
runs = 512

[invariant]
runs = 256
depth = 32

# Etherscan verification config is read from env so no secrets live in the repo.
[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 11155111 }
mainnet = { key = "${ETHERSCAN_API_KEY}", chain = 1 }

# RPC endpoints resolved from env at runtime.
[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
mainnet = "${MAINNET_RPC_URL}"
localhost = "http://127.0.0.1:8545"
